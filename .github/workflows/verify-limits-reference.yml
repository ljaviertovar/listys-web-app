name: Verify limits reference

on:
  pull_request:
    paths:
      - 'src/lib/config/limits.ts'
      - 'docs/reference/limits.md'
      - 'scripts/verify-limits-reference.mjs'
      - '.github/workflows/verify-limits-reference.yml'
  push:
    branches:
      - main
    paths:
      - 'src/lib/config/limits.ts'
      - 'docs/reference/limits.md'
      - 'scripts/verify-limits-reference.mjs'
      - '.github/workflows/verify-limits-reference.yml'

jobs:
  verify-limits-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify limits reference
        run: node ./scripts/verify-limits-reference.mjs
